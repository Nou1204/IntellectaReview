spring.datasource.url=jdbc:postgresql://localhost:5432/research_platform
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=3

spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.starttls.required=false
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=22MB

jwt.secret=${JWT_SECRET:6D5A7134743777217A25432A462D4A614E645267556B58703272357538782F41}
jwt.expiration=86400000

storage.local.path=${LOCAL_STORAGE_PATH:./storage}

server.port=8080

logging.level.com.platform=DEBUG
logging.level.org.springframework.security=INFO

grobid.url=http://localhost:8070
ai-service.url=${AI_SERVICE_URL:http://localhost:8000}
app.frontend-url=${APP_FRONTEND_URL:http://localhost:4200}